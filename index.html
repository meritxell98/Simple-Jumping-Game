<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Jumping Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="frame">

        <header>
            <span>runner<span class="dot">()</span></span>
        </header>

        <main class="game-shell">

            <section class="hud" aria-label="marcador">
                <span><span class="label">SCORE</span><span class="value" id="score">000000</span></span>
                <span><span class="label">HI</span><span class="value" id="highscore">000000</span></span>
            </section>

            <div class="canvas-wrap">
                <canvas id="game" width="800" height="280" aria-label="área de juego">
                </canvas>

                <!--

                <div class="overlay" id="overlay">
                    <h2>runner()</h2>
                    <p>Space / click / tap to jump</p>
                    <button id="startBtn">Play</button>
                </div>
            -->
            </div>

        </main>

        <footer>Space or ↑ to jump · hold ↓ to lay down</footer>

    </div>
    <script src="script.js"></script>
</body>
</html>
